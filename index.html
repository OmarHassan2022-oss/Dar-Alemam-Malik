<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>دار الإمام مالك | نظام إدارة التحفيظ المتكامل</title>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Cairo', system-ui, sans-serif;
    }

    :root {
      --primary: #16a34a;
      --primary-dark: #15803d;
      --primary-bg: #f0fdf4;
      --gold: #d97706;
      --blue: #2563eb;
      --purple: #7c3aed;
      --red: #dc2626;
      --teal: #0891b2;
      --bg: #f1f5f9;
      --card: #ffffff;
      --card-hover: #f8fafc;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #475569;
      --text-light: #94a3b8;
      --sidebar-bg: linear-gradient(180deg, #0a0f1c 0%, #030712 100%);
      --sidebar-text: #94a3b8;
      --sidebar-active: #22c55e;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
      --radius: 20px;
      --transition: all 0.2s ease;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --card: #1e293b;
      --card-hover: #162032;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #cbd5e1;
      --text-light: #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      transition: var(--transition);
    }

    /* login */
    .login-container {
      min-height: 100vh;
      background: linear-gradient(145deg, #0a1628, #07121f);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: rgba(15, 25, 45, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      border-radius: 24px;
      display: flex;
      margin: 0 auto 12px;
      align-items: center;
      justify-content: center;
      font-size: 38px;
    }

    .dar-name {
      font-size: 26px;
      font-weight: 800;
      text-align: center;
      color: white;
    }

    .dar-sub {
      text-align: center;
      color: #94a3b8;
      margin-top: 4px;
    }

    .login-verse {
      text-align: center;
      color: #4ade80;
      margin: 16px 0 24px;
    }

    .input-field {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      color: white;
      margin-top: 6px;
    }

    .btn-primary {
      background: linear-gradient(95deg, #16a34a, #22c55e);
      border: none;
      padding: 12px;
      border-radius: 16px;
      color: white;
      font-weight: bold;
      width: 100%;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    /* app layout */
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      overflow-y: auto;
      border-left: 1px solid rgba(255, 255, 255, 0.05);
      z-index: 100;
    }

    .main-content {
      margin-right: 280px;
      flex: 1;
    }

    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 99;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-3px);
    }

    .stat-icon {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .stat-info h4 {
      font-size: 13px;
      color: var(--text-muted);
    }

    .stat-number {
      font-size: 30px;
      font-weight: 800;
    }

    .row-2cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .chart-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th {
      background: var(--card-hover);
      padding: 12px;
      text-align: right;
      font-size: 12px;
      color: var(--text-muted);
    }

    .data-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .btn-sm {
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 40px;
      font-size: 11px;
      font-weight: 600;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--card);
      border-radius: 28px;
      width: 90%;
      max-width: 500px;
      padding: 24px;
    }

    .nav-group {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      padding: 16px 20px 6px;
    }

    .nav-item {
      background: none;
      border: none;
      width: calc(100% - 20px);
      margin: 2px 10px;
      padding: 10px 16px;
      text-align: right;
      border-radius: 12px;
      color: var(--sidebar-text);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    .nav-item.active {
      background: rgba(34, 197, 94, 0.12);
      color: white;
    }

    @media (max-width: 800px) {
      .sidebar {
        width: 0;
        display: none;
      }
      .main-content {
        margin-right: 0;
      }
    }
  </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="login-container">
  <div class="login-card">
    <div class="logo-icon">📖</div>
    <div class="dar-name" id="loginDarName">دار الإمام مالك</div>
    <div class="dar-sub">لتحفيظ القرآن والقراءات العشر</div>
    <div class="login-verse">﴿ إِنَّا نَحْنُ نَزَّلْنَا الذِّكْرَ وَإِنَّا لَهُ لَحَافِظُونَ ﴾</div>
    <div><input type="email" id="loginEmail" class="input-field" placeholder="البريد الإلكتروني" autocomplete="email"></div>
    <div style="margin-top:12px"><input type="password" id="loginPassword" class="input-field" placeholder="كلمة المرور"></div>
    <button class="btn-primary" style="margin-top:24px" onclick="login()">تسجيل الدخول</button>
    <div id="loginMsg" style="color:#f87171;margin-top:12px;text-align:center"></div>
  </div>
</div>

        <div id="usersSection" class="section"> <div id="usersTable"></div> </div>
      </div>
    </main>
  </div>
</div>

  // ======================== دوال مساعدة ========================
  function showToast(msg, type='info') { alert(msg); } // مبسطة
  async function fetchSettings() {
    let {data} = await supabase.from('settings').select('key,value');
    if(data) data.forEach(s=>darSettings[s.key]=s.value);
    document.querySelectorAll('#loginDarName, #sidebarDarName').forEach(el=>el.innerText=darSettings.dar_name||'دار الإمام مالك');
  }

  // ======================== تسجيل الدخول ========================
  async function login() {
    let email = document.getElementById('loginEmail').value;
    let pwd = document.getElementById('loginPassword').value;
    let {data, error} = await supabase.auth.signInWithPassword({email, password:pwd});
    if(error) { document.getElementById('loginMsg').innerText = error.message; return; }
    currentUser = data.user;
    let {data:prof} = await supabase.from('profiles').select('role,full_name').eq('id',currentUser.id).single();
    if(prof) userRole = prof.role;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContainer').style.display = 'block';
    document.getElementById('userNameSpan').innerText = prof?.full_name || 'مرحباً';
    await fetchSettings();
    loadDashboardStats();
    loadAllTables(); // تحميل بيانات جميع الجداول
  }

  // ======================== لوحة التحكم ========================

    document.getElementById('statsGrid').innerHTML=`
      <div class="stat-card"><div class="stat-icon" style="background:#f0fdf4;color:#16a34a">👥</div><div class="stat-info"><h4>الطلاب</h4><div class="stat-number">${students||0}</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#eff6ff;color:#2563eb">👨‍🏫</div><div class="stat-info"><h4>المعلمون</h4><div class="stat-number">${teachers||0}</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#f5f3ff;color:#7c3aed">🕌</div><div class="stat-info"><h4>الحلقات</h4><div class="stat-number">${circles||0}</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#fffbeb;color:#d97706">✅</div><div class="stat-info"><h4>حاضرون اليوم</h4><div class="stat-number">${present||0}</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#f0fdf4;color:#16a34a">📖</div><div class="stat-info"><h4>تسميعات اليوم</h4><div class="stat-number">${recToday||0}</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#fef2f2;color:#dc2626">📜</div><div class="stat-info"><h4>شهادات الشهر</h4><div class="stat-number">${certsMonth||0}</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#ecfeff;color:#0891b2">💰</div><div class="stat-info"><h4>إيرادات الشهر</h4><div class="stat-number">${revenue.toLocaleString()} ج.م</div></div></div>
    `;
    // رسم الحضور
    const {data:attLast30}=await supabase.from('attendance').select('status').gte('session_date',new Date(Date.now()-30*86400000).toISOString().split('T')[0]);
    let pres=0,abs=0,exc=0;
    if(attLast30) attLast30.forEach(a=>{if(a.status==='present')pres++;else if(a.status==='absent')abs++;else exc++;});
    const total=pres+abs+exc; const percent=total?Math.round(pres/total*100):0;
    const ctx=document.getElementById('attendanceDoughnut').getContext('2d');
    new Chart(ctx,{type:'doughnut',data:{labels:['حاضر','غائب','بعذر'],datasets:[{data:[pres,abs,exc],backgroundColor:['#16a34a','#dc2626','#f59e0b']}]}});
    document.getElementById('attPercent').innerHTML=`<strong>نسبة الحضور 30 يوم: ${percent}%</strong>`;
    // التسميعات الأسبوعية
    const days=Array.from({length:7},(_,i)=>{let d=new Date();d.setDate(d.getDate()-6+i);return d;});
    let recCounts=[];
    for(let d of days){ let f=d.toISOString().split('T')[0]; let {count}=await supabase.from('recitations').select('*',{count:'exact',head:true}).eq('session_date',f); recCounts.push(count||0); }
    new Chart(document.getElementById('weeklyRecChart'),{type:'bar',data:{labels:days.map(d=>d.toLocaleDateString('ar',{weekday:'short'})),datasets:[{label:'تسميع',data:recCounts,backgroundColor:'#16a34a'}]}});
    // آخر التسميعات
    const {data:recs}=await supabase.from('recitations').select('*,students(name)').order('session_date',{ascending:false}).limit(5);
    let html='<table class="data-table"><thead><tr><th>الطالب</th><th>السورة</th><th>التقييم</th><th>التاريخ</th></tr></thead><tbody>';
    if(recs) recs.forEach(r=>{html+=`<tr><td>${r.students?.name||'-'}</td><td>${r.surah_name}</td><td><span class="badge">${r.rating}</span></td><td>${r.session_date}</td></tr>`;});
    html+='</tbody></table>';
    document.getElementById('recentRecitationsTable').innerHTML=html;
    // أكثر الطلاب حفظاً (سور)
    const {data:memorizations}=await supabase.from('memorization_progress').select('student_id,students(name)').eq('status','memorized');
    let studentCount={};
    if(memorizations) memorizations.forEach(m=>{ let nm=m.students?.name||'غير معروف'; studentCount[nm]=(studentCount[nm]||0)+1; });
    let sorted=Object.entries(studentCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
    let topHtml='<div style="display:flex;flex-direction:column;gap:8px">';
    sorted.forEach(([name,count])=>{topHtml+=`<div><strong>${name}</strong> : ${count} سورة</div>`;});
    if(sorted.length===0) topHtml='<div>لا توجد بيانات بعد</div>';
    topHtml+='</div>';
    document.getElementById('topMemorizers').innerHTML=topHtml;
  }

  // ======================== تحميل جميع الجداول (نماذج مبسطة) ========================
  async function loadAllTables() {
    // Students
    let {data:students}=await supabase.from('students').select('*,circles(name)').eq('is_active',true);
    let stuHtml='<table class="data-table"><thead><tr><th>الاسم</th><th>المستوى</th><th>الحلقة</th><th>ولي الأمر</th><th>إجراءات</th></tr></thead><tbody>';
    if(students) students.forEach(s=>{stuHtml+=`<tr><td>${s.name}</td><td>${s.category}</td><td>${s.circles?.name||'-'}</td><td>${s.guardian_name||''}</td><td><button class="btn-sm" onclick="editStudent('${s.id}')">تعديل</button></td></tr>`;});
    stuHtml+='</tbody></table>';
    document.getElementById('studentsTable').innerHTML=stuHtml;

    // Teachers
    let {data:teachers}=await supabase.from('teachers').select('*').eq('is_active',true);
    let teaHtml='<table class="data-table"><thead><tr><th>الاسم</th><th>المؤهل</th><th>الهاتف</th><th>إجراءات</th></tr></thead><tbody>';
    if(teachers) teachers.forEach(t=>{teaHtml+=`<tr><td>${t.name}</td><td>${t.qualification||'-'}</td><td>${t.phone||'-'}</td><td><button class="btn-sm" onclick="editTeacher('${t.id}')">تعديل</button></td></tr>`;});
    teaHtml+='</tbody></table>';
    document.getElementById('teachersTable').innerHTML=teaHtml;

    // Circles (مع اسم المعلم)
    let {data:circles}=await supabase.from('circles').select('*,teachers(name)').eq('is_active',true);
    let cirHtml='<table class="data-table"><thead><tr><th>الحلقة</th><th>النوع</th><th>المعلم</th><th>الموقع</th><th>إجراءات</th></tr></thead><tbody>';
    if(circles) circles.forEach(c=>{cirHtml+=`<tr><td>${c.name}</td><td>${c.type}</td><td>${c.teachers?.name||'-'}</td><td>${c.location||'-'}</td><td><button class="btn-sm" onclick="editCircle('${c.id}')">تعديل</button></td></tr>`;});
    cirHtml+='</tbody></table>';
    document.getElementById('circlesTable').innerHTML=cirHtml;

    // Memorization Progress (لجميع الطلاب - عرض بسيط)
    let {data:prog}=await supabase.from('memorization_progress').select('*,students(name)').order('created_at',{ascending:false});
    let progHtml='<table class="data-table"><thead><tr><th>الطالب</th><th>السورة</th><th>الحالة</th><th>تاريخ الإتمام</th><th>إجراءات</th></tr></thead><tbody>';
    if(prog) prog.forEach(p=>{progHtml+=`<tr><td>${p.students?.name||'-'}</td><td>${p.surah_name}</td><td>${p.status}</td><td>${p.completion_date||'-'}</td><td><button class="btn-sm" onclick="deleteMemorization('${p.id}')">حذف</button></td></tr>`;});
    progHtml+='</tbody></table>';
    document.getElementById('memorizationTable').innerHTML=progHtml;

    // Recitations
    let {data:recsAll}=await supabase.from('recitations').select('*,students(name)').order('session_date',{ascending:false}).limit(50);
    let recHtml='<table class="data-table"><thead><tr><th>الطالب</th><th>السورة</th><th>النوع</th><th>التقييم</th><th>التاريخ</th></tr></thead><tbody>';
    if(recsAll) recsAll.forEach(r=>{recHtml+=`<tr><td>${r.students?.name||'-'}</td><td>${r.surah_name}</td><td>${r.type}</td><td>${r.rating}</td><td>${r.session_date}</td></tr>`;});
    recHtml+='</tbody></table>';
    document.getElementById('recitationsTable').innerHTML=recHtml;

    // Certificates
    let {data:certs}=await supabase.from('certificates').select('*,students(name)').order('issue_date',{ascending:false});
    let certHtml='<table><thead><tr><th>الطالب</th><th>النوع</th><th>الوصف</th><th>تاريخ الإصدار</th></tr></thead><tbody>';
    if(certs) certs.forEach(c=>{certHtml+=`<tr><td>${c.students?.name||'-'}</td><td>${c.type}</td><td>${c.description||''}</td><td>${c.issue_date}</td></tr>`;});
    certHtml+='</tbody></table>';
    document.getElementById('certificatesTable').innerHTML=certHtml;

    // Activities
    let {data:acts}=await supabase.from('activities').select('*').order('start_date',{ascending:false});
    let actHtml='<table><thead><tr><th>النشاط</th><th>النوع</th><th>التاريخ</th><th>الحالة</th></tr></thead><tbody>';
    if(acts) acts.forEach(a=>{actHtml+=`<tr><td>${a.title}</td><td>${a.type}</td><td>${a.start_date}</td><td>${a.status}</td></tr>`;});
    actHtml+='</tbody></table>';
    document.getElementById('activitiesTable').innerHTML=actHtml;

    // Payments
    let {data:pays}=await supabase.from('payments').select('*,students(name)').order('payment_date',{ascending:false});
    let payHtml='<table><thead><tr><th>الطالب</th><th>المبلغ</th><th>الشهر</th><th>الحالة</th></tr></thead><tbody>';
    if(pays) pays.forEach(p=>{payHtml+=`<tr><td>${p.students?.name||'-'}</td><td>${p.amount} ج.م</td><td>${p.payment_month}</td><td>${p.status}</td></tr>`;});
    payHtml+='</tbody></table>';
    document.getElementById('paymentsTable').innerHTML=payHtml;

    // Notifications
    let {data:notifs}=await supabase.from('notifications').select('*').order('created_at',{ascending:false});
    let notHtml='<table><thead><tr><th>العنوان</th><th>المحتوى</th><th>النوع</th><th>التاريخ</th></tr></thead><tbody>';
    if(notifs) notifs.forEach(n=>{notHtml+=`<tr><td>${n.title}</td><td>${n.body||''}</td><td>${n.type}</td><td>${new Date(n.created_at).toLocaleDateString()}</td></tr>`;});
    notHtml+='</tbody></table>';
    document.getElementById('notificationsTable').innerHTML=notHtml;
  }

  // دوال إضافة وتعديل (نماذج مبسطة - يمكن توسيعها لاحقاً)
  window.openStudentModal=()=>{alert('فتح نموذج إضافة طالب (يمكنك توسيع الكود بسهولة)');}
  window.openTeacherModal=()=>{alert('إضافة معلم');}
  window.openCircleModal=()=>{alert('إضافة حلقة');}
  window.openRecitationModal=()=>{alert('تسجيل تسميع');}
  window.openMemorizationModal=()=>{
    let studentId=prompt('أدخل معرف الطالب (UUID)');
    let surahNum=prompt('رقم السورة (1-114)');
    let surahName=surahList.find(s=>s.number==surahNum)?.name||'';
    if(studentId && surahNum) supabase.from('memorization_progress').insert({student_id:studentId, surah_number:surahNum, surah_name:surahName, status:'memorized'}).then(()=>loadAllTables());
  }
  window.openCertificateModal=()=>{alert('إصدار شهادة');}
  window.openActivityModal=()=>{alert('إضافة نشاط');}
  window.openPaymentModal=()=>{alert('تسجيل دفعة');}
  window.openNotificationModal=()=>{alert('إرسال إشعار');}
  window.generateReport=(type)=>{document.getElementById('reportOutput').innerHTML=`<pre>تقرير ${type} - يمكنك تخصيصه لاحقاً</pre>`;}
  window.exportCSV=()=>{alert('تصدير CSV');}
  window.loadAttendance=()=>{}
  window.saveAttendance=()=>{}

  // التنقل بين الأقسام
  document.querySelectorAll('.nav-item[data-section]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      let section=btn.getAttribute('data-section');
      document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
      document.getElementById(section+'Section').classList.add('active');
      document.getElementById('currentPageTitle').innerText=btn.innerText.trim();
      if(section==='dashboard') loadDashboardStats();
    });
  });

  // التحقق من الجلسة عند التحميل
  window.onload=async()=>{
    let {data:{session}} = await supabase.auth.getSession();
    if(session){
      currentUser=session.user;
      let {data:prof}=await supabase.from('profiles').select('role,full_name').eq('id',currentUser.id).single();
      if(prof) userRole=prof.role;
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('appContainer').style.display='block';
      document.getElementById('userNameSpan').innerText=prof?.full_name||'مرحباً';
      await fetchSettings();
      loadDashboardStats();
      loadAllTables();
    }
  };
</script>
</body>
